version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: pungoe_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ta_odiq}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pungoe_network

  app:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
    container_name: pungoe_app
    depends_on:
      - postgres
      - kali-tools
      - chromadb
    ports:
      - "3000:3000"
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: pentest-ai
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-ta_odiq}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      KALI_TOOLS_URL: http://kali-tools:5000
    networks:
      - pungoe_network
    restart: unless-stopped

  kali-tools:
    build:
      context: .
      dockerfile: Dockerfile.kali
    container_name: pungoe_kali_tools
    hostname: kali-tools
    ports:
      - "5000:5000"
    volumes:
      - ./kali-tools:/app
      - ./uploads:/app/uploads
    environment:
      FLASK_ENV: production
      POSTGRES_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-ta_odiq}
    networks:
      - pungoe_network
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW

  chromadb:
    image: python:3.11-slim
    container_name: pungoe_chromadb
    working_dir: /app
    command: >
      sh -c "pip install chroma && mkdir -p /app/db/chroma_langchain_db && chroma run --host 0.0.0.0 --port 8000 --path /app/db/chroma_langchain_db"
    ports:
      - "8000:8000"
    volumes:
      - ./db/chroma_langchain_db:/app/db/chroma_langchain_db
    networks:
      - pungoe_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  pungoe_network:
    driver: bridge